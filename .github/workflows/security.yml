name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # weekly re-scan of the published image

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Schedule-only: never add this job to required checks (it is skipped on PRs)
  trivy-published:
    name: Trivy re-scan of published image
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Scan tikibozo/kometa-ai:latest
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tikibozo/kometa-ai:latest
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
